!

!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname R2
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
memory-size iomem 5
no ip icmp rate-limit unreachable
ip cef
!
!
no ip dhcp use vrf connected
ip dhcp excluded-address 172.24.72.1 172.24.72.49
!
ip dhcp pool BDD_LAN
   network 172.24.72.0 255.255.254.0
   default-router 172.24.72.1 
   dns-server 8.8.8.8 1.1.1.1 
!
!
no ip domain lookup
!
multilink bundle-name authenticated
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
archive
 log config
  hidekeys
! 
crypto isakmp key VPN_KEY address 203.0.75.41
crypto isakmp key VPN_KEY address 203.0.64.2
crypto isakmp key VPN_KEY address 203.0.113.2
!
!
!
ip tcp synwait-time 5
!
!
!
!
interface Tunnel32
 ip address 192.168.10.6 255.255.255.252
 tunnel source FastEthernet0/0
 tunnel destination 203.0.75.41
!
interface Tunnel33
 ip address 192.168.10.18 255.255.255.252
 tunnel source FastEthernet0/0
 tunnel destination 203.0.64.2
!
interface Tunnel35
 no ip address
 tunnel source FastEthernet0/0
 tunnel destination 203.0.72.2
!
interface FastEthernet0/0
 ip address 172.24.72.1 255.255.254.0
 ip nat inside
 ip virtual-reassembly
 duplex auto
 speed auto
!
interface FastEthernet0/1
 ip address 203.0.72.2 255.255.255.252
 ip nat outside
 ip virtual-reassembly
 duplex auto
 speed auto
!
ip forward-protocol nd
ip route 0.0.0.0 0.0.0.0 203.0.72.1
ip route 172.24.0.0 255.255.192.0 Tunnel32
ip route 172.24.64.0 255.255.248.0 Tunnel33
ip route 172.24.74.0 255.255.255.0 Tunnel35
ip route 203.0.64.0 255.255.255.252 203.0.64.2
!
!
no ip http server
no ip http secure-server
ip nat inside source list 1 interface FastEthernet0/1 overload
ip nat inside source static 172.24.72.2 22.22.22.22
!
access-list 1 permit 172.24.72.0 0.0.1.255
no cdp log mismatch duplex
!
!
!
!
!
!
control-plane
!
!
!
!
!
!
!
!
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line vty 0 4
 login
!
!
end
